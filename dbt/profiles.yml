# dbt profiles configuration for DuckDB
dbt_project:
  target: dev
  outputs:
    dev:
      type: duckdb
      path: '/dbt/duckdb/analytics_dev.duckdb'
      threads: 4
      timeout_seconds: 300
      
      # S3/MinIO configuration for external data
      s3_access_key_id: "{{ env_var('MINIO_ACCESS_KEY') }}"
      s3_secret_access_key: "{{ env_var('MINIO_SECRET_KEY') }}"
      s3_endpoint: "{{ env_var('MINIO_ENDPOINT') }}"
      s3_session_token: ""
      s3_region: "us-east-1"
      
      load_target_schema: true
      
    prod:
      type: duckdb
      path: '/dbt/duckdb/analytics_prod.duckdb'
      threads: 8
      timeout_seconds: 300
      
      s3_access_key_id: "{{ env_var('MINIO_ACCESS_KEY') }}"
      s3_secret_access_key: "{{ env_var('MINIO_SECRET_KEY') }}"
      s3_endpoint: "{{ env_var('MINIO_ENDPOINT') }}"
      s3_session_token: ""
      s3_region: "us-east-1"
      
      load_target_schema: true