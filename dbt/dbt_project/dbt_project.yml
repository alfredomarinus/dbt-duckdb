
# Name your project! Project names should be snake_case and cannot contain spaces.
name: 'dbt_project'
version: '1.0.0'
config-version: 2

# This setting configures which "profile" dbt uses for this project.
profile: 'dbt_project'

# These configurations specify where dbt should look for different types of files.
model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]
target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

# Configuring models
# Full documentation: https://docs.getdbt.com/docs/configuring-models

# In this example config, we tell dbt to build all models in the "models" folder
# as tables. These settings can be overridden in the individual model files
# using the `{{ config(...) }}` macro.
models:
  dbt_project:
    # Config indicated by + will be applied to all files under models/example/
    staging:
      +materialized: table
      +file_key_sort: true
    intermediate:
      +materialized: table
      +file_key_sort: true
    marts:
      +materialized: table
      +file_key_sort: true

# Variables for dbt project
vars:
  # MinIO/S3 Configuration
  minio_endpoint: "http://minio:9000"
  minio_bucket: "dbt-data"
  
  # DuckDB Configuration
  duckdb_path: "/opt/airflow/duckdb"
  
  # Data transformation variables
  default_schema: "analytics"
  raw_schema: "raw"
